name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }} - ${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  check-for-duplicate-packages:
    name: Check for duplicate packages with Node.js ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        node-version: [24, latest]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }} and Install dependencies on ${{ matrix.os }}
        uses: actions/setup-node@v6
        with:
          cache-dependency-path: ./package-lock.json
          cache: "npm"
          check-latest: true
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies on ${{ matrix.node-version }}
        run: npm ci

      - name: Check for duplicate packages
        run: npm find-dupes

  check-formatting:
    name: Check formatting with Node.js ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        node-version: [24, latest]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }} and Install dependencies on ${{ matrix.os }}
        uses: actions/setup-node@v6
        with:
          cache-dependency-path: ./package-lock.json
          cache: "npm"
          check-latest: true
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies on ${{ matrix.node-version }}
        run: npm ci

      - name: Check formatting
        run: npm run format-check

  check-lint:
    name: Check lint with Node.js ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        node-version: [24, latest]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }} and Install dependencies on ${{ matrix.os }}
        uses: actions/setup-node@v6
        with:
          cache-dependency-path: ./package-lock.json
          cache: "npm"
          check-latest: true
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies on ${{ matrix.node-version }}
        run: npm ci

      - name: Lint files
        run: npm run lint

  check-types:
    name: Test types with TypeScript ${{ matrix.ts }} on ${{ matrix.os }} and Node.js ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        node-version: [24, latest]
        os: [ubuntu-latest, windows-latest, macos-latest]
        ts: ["5.6", "5.7", "5.8", "5.9"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }} and Install dependencies on ${{ matrix.os }}
        uses: actions/setup-node@v6
        with:
          cache-dependency-path: ./package-lock.json
          cache: "npm"
          check-latest: true
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies on ${{ matrix.node-version }}
        run: npm ci

      - name: Install TypeScript ${{ matrix.ts }}
        run: npm install -D typescript@${{ matrix.ts }}

      - name: Run type tests
        run: npm run typecheck

  build:
    name: Build with Node.js ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        node-version: [24, latest]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }} and Install dependencies on ${{ matrix.os }}
        uses: actions/setup-node@v6
        with:
          cache-dependency-path: ./package-lock.json
          cache: "npm"
          check-latest: true
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies on ${{ matrix.node-version }}
        run: npm ci

      - name: Build with Node.js ${{ matrix.node-version }} on ${{ matrix.os }}
        run: npm run build

      - name: Did we fail?
        if: failure()
        run: ls -R .

  test:
    name: Run tests with Node.js ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        node-version: [24, latest]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }} and Install dependencies on ${{ matrix.os }}
        uses: actions/setup-node@v6
        with:
          cache-dependency-path: ./package-lock.json
          cache: "npm"
          check-latest: true
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies on ${{ matrix.node-version }}
        run: npm ci

      - name: Run tests with Node.js ${{ matrix.node-version }} on ${{ matrix.os }}
        run: npm run test

      - name: Did we fail?
        if: failure()
        run: ls -R
